name: Automated Release & Deployment

on:
  push:
    branches:
      - main

# ============================================================
# Prepare Release
# ============================================================
jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      version: ${{ steps.read_version.outputs.version }}

    steps:
      # ===========================
      # Checkout Repository
      # ===========================
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ===========================
      # Setup Node.js
      # ===========================
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # ===========================
      # Install Dependencies
      # ===========================
      - name: Install dependencies
        run: npm ci

      # ===========================
      # Parse Commit
      # ===========================
      - name: Parse commit message
        id: parse
        run: node scripts/parse-commit.js

      # ===========================
      # Bump Version
      # ===========================
      - name: Bump version
        id: version
        run: node scripts/bump-version.js

      # ===========================
      # Read Version
      # ===========================
      - name: Read version
        id: read_version
        run: |
          VERSION=$(jq -r '.version' commits.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # ===========================
      # Commit Version Changes
      # ===========================
      - name: Commit version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add commits.json service-worker.js CHANGELOG.md

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Bump version to ${{ steps.read_version.outputs.version }}"
            git push
          fi


  # ============================================================
  # Build Web Artifacts
  # ============================================================
  build-web:
    name: Build Web Artifacts
    runs-on: ubuntu-latest

    needs: prepare-release

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ===========================
      # Build Artifacts
      # ===========================
      - name: Build user and dev artifacts
        run: node scripts/build-artifacts.js

      # ===========================
      # Upload Web Assets
      # ===========================
      - name: Upload web assets
        uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: |
            dist/user.zip
            dist/dev.zip
            dist/user


  # ============================================================
  # Build Android APK
  # ============================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    needs: prepare-release

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ===========================
      # Capacitor Requirement
      # ===========================
      - name: Create dummy web directory
        run: |
          mkdir -p www
          touch www/index.html

      # ===========================
      # Capacitor Sync
      # ===========================
      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      # ===========================
      # Restore Keystore
      # ===========================
      - name: Restore Keystore
        working-directory: android/app
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > rgt-release.keystore

      # ===========================
      # Build Signed APK
      # ===========================
      - name: Build Signed APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/rgt-release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      # ===========================
      # Upload APK Artifact
      # ===========================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk


  # ============================================================
  # Publish Single Release + Deploy Pages
  # ============================================================
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest

    needs:
      - prepare-release
      - build-web
      - build-android

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # ===========================
      # Download Build Outputs
      # ===========================
      - name: Download artifacts
        uses: actions/download-artifact@v8

      # ===========================
      # Create GitHub Release
      # ===========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          generate_release_notes: true
          files: |
            web-assets/user.zip
            web-assets/dev.zip
            android-apk/app-release.apk
          draft: false
          prerelease: false

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ===========================
      # Deploy GitHub Pages
      # ===========================
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web-assets/user

      - name: Deploy GitHub Pages
        uses: actions/deploy-pages@v4
